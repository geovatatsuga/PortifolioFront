        <h1>Jeová Anderson - Data Science, Business Intelligence e IA</h1>
        <p>Analista de Dados e especialista em BI com projetos em Ciência de Dados, Machine Learning, Engenharia de Dados, Azure Databricks, Delta Lake, PySpark, MLflow, Power BI, Dash, Plotly, RFM, K-Means, Churn, detecção de fraudes, IA Generativa e LLMs.</p>
        <h2>Projetos principais</h2>
        <h3>Fraud Risk BI</h3>
        <p>Interface de BI interativa para análise de risco de fraude, com foco em leitura rápida, hierarquia visual, cards de KPI e gráficos prontos para decisão.</p>
        <h3>Detecção de Fraudes Lakehouse</h3>
        <p>Pipeline lakehouse ponta a ponta para detecção de fraudes processando 6,36M+ transações PaySim em camadas Bronze, Silver e Gold. Random Forest com features alcançou 99,45% de recall e R$ 73,21M de ganho financeiro simulado.</p>
        <h3>Segmentação de Clientes</h3>
        <p>Segmentação comportamental com features RFM, transformações estatísticas e K-Means. Classificação de clientes em 10 subgrupos de negócio e 4 clusters, entregue em dashboard interativo com Dash e Plotly.</p>
        <h3>Previsão de Churn</h3>
        <p>Solução integrada de churn com extração via SQL Server, pré-processamento em Python, Random Forest em 1.926 amostras e dashboards Dash/Plotly. Resultado de 81% de acurácia e análise dos principais fatores de churn.</p>
        <h3>Cereus CRM</h3>
        <p>Interface CRM para organizar dados de clientes, ações e contexto de negócio com fluxo limpo e estrutura visual pronta para analytics.</p>
